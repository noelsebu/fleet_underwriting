<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FleetGuard — Policy Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .topbar { background: linear-gradient(135deg, #0d1b2a, #1b3a5c); color: white; padding: 18px 24px;
                  display: flex; align-items: center; gap: 12px; }
        .topbar a { color: rgba(255,255,255,.7); text-decoration: none; font-size: .9rem; }
        .topbar a:hover { color: white; }
        .lookup-card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
                       padding: 40px; max-width: 480px; margin: 60px auto; }
        .form-control { border-radius: 8px; border: 1.5px solid #dee2e6; padding: 12px 14px; font-size: .95rem; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.12); }
        .btn-lookup { background: linear-gradient(135deg, #0a58ca, #0d6efd); border: none;
                      color: white; padding: 12px; border-radius: 8px; font-weight: 700; width: 100%; }
        footer { background: #1b3a5c; color: rgba(255,255,255,.6); text-align: center; padding: 20px; font-size: .85rem; }
    </style>
</head>
<body>
<div class="topbar">
    <a th:href="@{/}"><i class="bi bi-arrow-left"></i> Back</a>
    <span style="opacity:.4">|</span>
    <i class="bi bi-shield-check" style="font-size:1.3rem;"></i>
    <span style="font-weight:700; font-size:1.1rem;">FleetGuard</span>
</div>

<div class="lookup-card">
    <div class="text-center mb-4">
        <i class="bi bi-search" style="font-size:2.2rem; color:#0d6efd;"></i>
        <h3 class="fw-bold mt-2 mb-1" style="color:#1b3a5c;">Policy Lookup</h3>
        <p class="text-muted small">Enter your Customer ID or Policy Number to view your coverage.</p>
    </div>

    <div th:if="${error}" class="alert alert-danger py-2 small mb-3">
        <i class="bi bi-exclamation-circle me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/policy/check}" method="get">
        <div class="mb-3">
            <label class="form-label fw-semibold">Customer ID or Policy Number</label>
            <input type="text" name="reference" class="form-control"
                   placeholder="e.g. CUST-2026-0001 or Pol-2026-1" required autofocus />
            <div class="form-text">You received this when your policy was issued.</div>
        </div>
        <button type="submit" class="btn btn-lookup">
            <i class="bi bi-search me-2"></i>Find My Policy
        </button>
    </form>
</div>

<footer>&copy; 2026 FleetGuard Insurance</footer>
</body>
</html>
