<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FleetGuard — Submission History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .topbar {
            background: linear-gradient(135deg, #0d1b2a, #1b3a5c);
            color: white; padding: 18px 24px;
            display: flex; align-items: center; gap: 12px;
        }
        .topbar a { color: rgba(255,255,255,.7); text-decoration: none; font-size: .9rem; }
        .topbar a:hover { color: white; }
        .badge-LOW    { background: #d1e7dd; color: #0f5132; }
        .badge-MEDIUM { background: #fff3cd; color: #664d03; }
        .badge-HIGH   { background: #f8d7da; color: #842029; }
        .status-ACTIVE         { color: #198754; font-weight: 600; }
        .status-PENDING_REVIEW { color: #856404; font-weight: 600; }
        .status-REJECTED       { color: #dc3545; font-weight: 600; }
        footer { background: #1b3a5c; color: rgba(255,255,255,.6); text-align: center; padding: 20px; font-size: .85rem; }
    </style>
</head>
<body>

<div class="topbar">
    <i class="bi bi-shield-check" style="font-size:1.5rem; color:#4dabf7;"></i>
    <span style="font-size:1.1rem; font-weight:700;">FleetGuard Insurance</span>
    <span style="margin-left:auto;">
        <a th:href="@{/}"><i class="bi bi-house"></i> Home</a>
    </span>
</div>

<div class="container py-5">
    <h2 class="fw-bold mb-1">Submission History</h2>
    <p class="text-muted mb-4">All past underwriting submissions, most recent first.</p>

    <div th:if="${#lists.isEmpty(records)}" class="alert alert-info">
        No submissions yet. <a th:href="@{/}">Submit a quote</a> to get started.
    </div>

    <div th:if="${!#lists.isEmpty(records)}" class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Company</th>
                        <th>Tier</th>
                        <th>Risk Score</th>
                        <th>Category</th>
                        <th>Action</th>
                        <th>Policy No.</th>
                        <th>Status</th>
                        <th>Premium</th>
                        <th>Submitted</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${records}">
                        <td th:text="${r.companyName}"></td>
                        <td th:text="${r.selectedTier}"></td>
                        <td th:text="${r.riskScore}"></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="'badge-' + ${r.riskCategory}"
                                  th:text="${r.riskCategory}"></span>
                        </td>
                        <td th:text="${r.recommendedAction}"></td>
                        <td th:text="${r.policyNumber != null ? r.policyNumber : '—'}"></td>
                        <td>
                            <span th:classappend="'status-' + ${r.policyStatus}"
                                  th:text="${r.policyStatus}"></span>
                        </td>
                        <td th:text="${r.annualPremium != null ? '$' + r.annualPremium : '—'}"></td>
                        <td th:text="${#temporals.format(r.submittedAt, 'dd MMM yyyy HH:mm')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer>&copy; 2026 FleetGuard Insurance &mdash; Powered by smart underwriting</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
