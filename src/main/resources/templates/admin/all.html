<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FleetGuard — All Submissions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .sidebar { background: linear-gradient(180deg, #0d1b2a, #1b3a5c); min-height: 100vh;
                   width: 220px; position: fixed; top: 0; left: 0; padding: 24px 0; }
        .sidebar .brand { color: white; font-weight: 700; font-size: 1.1rem; padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,.1); }
        .sidebar a { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.7);
                     text-decoration: none; padding: 12px 20px; font-size: .92rem; transition: background .15s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,.1); color: white; }
        .main { margin-left: 220px; padding: 32px; }
        .badge-LOW    { background: #d1e7dd; color: #0f5132; }
        .badge-MEDIUM { background: #fff3cd; color: #664d03; }
        .badge-HIGH   { background: #f8d7da; color: #842029; }
        .status-pill { padding: 3px 10px; border-radius: 20px; font-size: .78rem; font-weight: 700; }
        .st-PENDING_CUSTOMER_ACCEPTANCE { background:#cfe2ff; color:#084298; }
        .st-PENDING_ADMIN_REVIEW        { background:#fff3cd; color:#664d03; }
        .st-POLICY_ISSUED               { background:#d1e7dd; color:#0f5132; }
        .st-REJECTED                    { background:#f8d7da; color:#842029; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand"><i class="bi bi-shield-check me-2"></i>FleetGuard Admin</div>
    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/queue}"><i class="bi bi-inbox"></i> Review Queue</a>
    <a th:href="@{/admin/all}" class="active"><i class="bi bi-list-ul"></i> All Submissions</a>
    <a th:href="@{/admin/claims}"><i class="bi bi-file-earmark-medical"></i> Claims</a>
    <a th:href="@{/admin/logout}" style="position:absolute; bottom:20px; width:100%;"><i class="bi bi-box-arrow-left"></i> Logout</a>
</div>

<div class="main">
    <h2 class="fw-bold mb-1" style="color:#1b3a5c;">All Submissions</h2>
    <p class="text-muted mb-4">Complete history of all underwriting applications.</p>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Company</th>
                        <th>Phone</th>
                        <th>Tier</th>
                        <th>Risk</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Customer ID</th>
                        <th>Policy No.</th>
                        <th>Premium</th>
                        <th>Submitted</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${records}">
                        <td class="fw-semibold" th:text="${r.companyName}"></td>
                        <td>
                            <span th:text="${r.phoneNumber}"></span>
                            <small th:if="${r.phoneExtension != null and !r.phoneExtension.isEmpty()}"
                                   class="text-muted" th:text="' ext. ' + ${r.phoneExtension}"></small>
                        </td>
                        <td th:text="${r.selectedTier}"></td>
                        <td th:text="${r.riskScore}"></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="'badge-' + ${r.riskCategory}"
                                  th:text="${r.riskCategory}"></span>
                        </td>
                        <td>
                            <span class="status-pill"
                                  th:classappend="'st-' + ${r.workflowStatus}"
                                  th:text="${r.workflowStatus != null ? r.workflowStatus.replace('_', ' ') : '—'}"></span>
                        </td>
                        <td th:text="${r.customerId != null ? r.customerId : '—'}"></td>
                        <td th:text="${r.policyNumber != null ? r.policyNumber : '—'}"></td>
                        <td th:text="${r.annualPremium != null ? '$' + r.annualPremium : '—'}"></td>
                        <td th:text="${#temporals.format(r.submittedAt, 'dd MMM yyyy HH:mm')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
