<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FleetGuard — Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0d1b2a 0%, #1b3a5c 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
                      box-shadow: 0 20px 60px rgba(0,0,0,.4); }
        .login-card h2 { font-size: 1.5rem; font-weight: 700; color: #1b3a5c; margin-bottom: 4px; }
        .form-control { border-radius: 8px; border: 1.5px solid #dee2e6; padding: 11px 14px; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.12); }
        .form-control.is-invalid { border-color: #dc3545; background-image: none; }
        .btn-login { background: linear-gradient(135deg, #0a58ca, #0d6efd); border: none;
                     color: white; padding: 12px; border-radius: 8px; font-weight: 700; width: 100%; font-size: 1rem; }
        .btn-login:hover { opacity: .9; color: white; }
        .btn-login:active { transform: scale(.98); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15%       { transform: translateX(-8px); }
            30%       { transform: translateX(8px); }
            45%       { transform: translateX(-6px); }
            60%       { transform: translateX(6px); }
            75%       { transform: translateX(-4px); }
            90%       { transform: translateX(4px); }
        }
        .shake { animation: shake .5s ease-in-out; }

        .error-box { border-radius: 10px; border: 1px solid #f5c2c7; background: #fff5f5; padding: 14px 16px; }
        .attempt-badge { background: #dc3545; color: white; border-radius: 20px;
                         font-size: .72rem; font-weight: 700; padding: 2px 8px; }
    </style>
</head>
<body>
<div class="login-card" id="loginCard">
    <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill" style="font-size:2.5rem; color:#0d6efd;" id="shieldIcon"></i>
        <h2 class="mt-2">Admin Portal</h2>
        <p class="text-muted small">FleetGuard Underwriting Administration</p>
    </div>

    <!-- Login failure alert -->
    <div th:if="${param.error}" class="error-box mb-4" id="errorBox">
        <div class="d-flex align-items-start gap-2">
            <i class="bi bi-exclamation-triangle-fill text-danger mt-1 flex-shrink-0"></i>
            <div>
                <div class="fw-semibold text-danger" style="font-size:.93rem;">Invalid username or password</div>
                <div class="text-muted mt-1" style="font-size:.82rem;">
                    Please double-check your credentials and try again.
                    If you have forgotten your credentials, please
                    <a href="mailto:support@fleetguard.com" class="text-danger fw-semibold">contact support</a>.
                </div>
            </div>
        </div>
    </div>

    <!-- Logout success -->
    <div th:if="${param.logout}" class="alert alert-success py-2 small mb-3">
        <i class="bi bi-check-circle me-1"></i> You have been signed out successfully.
    </div>

    <form th:action="@{/admin/login}" method="post" id="loginForm">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-muted text-uppercase" style="letter-spacing:.5px;">Username</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:8px 0 0 8px; border: 1.5px solid #dee2e6;">
                    <i class="bi bi-person" style="color:#6c757d;"></i>
                </span>
                <input type="text" name="username" id="username"
                       class="form-control"
                       th:classappend="${param.error} ? 'is-invalid' : ''"
                       style="border-radius: 0 8px 8px 0;"
                       placeholder="admin" autofocus required />
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold small text-muted text-uppercase" style="letter-spacing:.5px;">Password</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:8px 0 0 8px; border: 1.5px solid #dee2e6;">
                    <i class="bi bi-lock" style="color:#6c757d;"></i>
                </span>
                <input type="password" name="password" id="password"
                       class="form-control"
                       th:classappend="${param.error} ? 'is-invalid' : ''"
                       style="border-radius: 0 8px 8px 0;"
                       placeholder="••••••••" required />
                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                        style="border-radius: 0 8px 8px 0;" tabindex="-1">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
            <div th:if="${param.error}" class="invalid-feedback d-block mt-1" style="font-size:.8rem;">
                Incorrect password. Please try again.
            </div>
        </div>
        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/}" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to site</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Shake card on error
    (function () {
        const url = new URL(window.location.href);
        if (url.searchParams.has('error')) {
            const card = document.getElementById('loginCard');
            card.classList.add('shake');
            card.addEventListener('animationend', () => card.classList.remove('shake'));
        }
    })();

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pwd.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
</body>
</html>
