<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FleetGuard — Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0d1b2a 0%, #1b3a5c 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
                      box-shadow: 0 20px 60px rgba(0,0,0,.4); }
        .login-card h2 { font-size: 1.5rem; font-weight: 700; color: #1b3a5c; margin-bottom: 4px; }
        .form-control { border-radius: 8px; border: 1.5px solid #dee2e6; padding: 11px 14px; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.12); }
        .btn-login { background: linear-gradient(135deg, #0a58ca, #0d6efd); border: none;
                     color: white; padding: 12px; border-radius: 8px; font-weight: 700; width: 100%; }
        .btn-login:hover { opacity: .9; color: white; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill" style="font-size:2.5rem; color:#0d6efd;"></i>
        <h2 class="mt-2">Admin Portal</h2>
        <p class="text-muted small">FleetGuard Underwriting Administration</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-circle me-1"></i> Invalid username or password.
    </div>

    <form th:action="@{/admin/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-600 small text-muted">USERNAME</label>
            <input type="text" name="username" class="form-control" placeholder="admin" autofocus required />
        </div>
        <div class="mb-4">
            <label class="form-label fw-600 small text-muted">PASSWORD</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/}" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to site</a>
    </div>
</div>
</body>
</html>
