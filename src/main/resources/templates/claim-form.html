<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FleetGuard — File a Claim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .header { background: linear-gradient(135deg, #0d1b2a 0%, #1b3a5c 100%); color: white; padding: 40px 20px 30px; text-align: center; }
        .form-card { max-width: 640px; margin: -20px auto 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.10); border: none; }
    </style>
</head>
<body>

<nav style="background:#0d1b2a; padding:10px 24px; display:flex; align-items:center; justify-content:space-between;">
    <a th:href="@{/admin/login}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-shield-lock me-1"></i> Admin Login
    </a>
    <div class="d-flex gap-2">
        <a th:href="@{/}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-house me-1"></i> Home
        </a>
        <a th:href="@{/policy/lookup}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-search me-1"></i> Check My Policy
        </a>
    </div>
</nav>

<div class="header">
    <i class="bi bi-file-earmark-plus" style="font-size:2.4rem; color:#4dabf7;"></i>
    <h2 class="fw-bold mt-2 mb-1">File a Claim</h2>
    <p class="mb-0" style="opacity:.8;">Enter your Customer ID or Policy Number to get started.</p>
</div>

<div class="container" style="padding-top:40px;">
    <div class="card form-card">
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 mb-4">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/claim/submit}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Customer ID or Policy Number</label>
                    <input type="text" name="reference" class="form-control" placeholder="e.g. CUST-2025-0001 or Pol-2025-1" required>
                    <div class="form-text">Find this on your policy confirmation page.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Incident Date</label>
                    <input type="date" name="incidentDate" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Incident Description</label>
                    <textarea name="incidentDescription" class="form-control" rows="4"
                              placeholder="Describe what happened, where, and what vehicles were involved..." required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Claim Amount (USD)</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" name="claimAmount" class="form-control" step="0.01" min="1" placeholder="0.00" required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="atFault" id="atFault" value="true">
                        <label class="form-check-label" for="atFault">
                            My fleet vehicle was at fault in this incident
                        </label>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-warning fw-semibold" style="padding:12px;">
                        <i class="bi bi-send me-2"></i>Submit Claim
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
