<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FleetGuard — My Policy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .topbar { background: linear-gradient(135deg, #0d1b2a, #1b3a5c); color: white; padding: 18px 24px;
                  display: flex; align-items: center; gap: 12px; }
        .topbar a { color: rgba(255,255,255,.7); text-decoration: none; }
        .topbar a:hover { color: white; }
        .policy-issued { border-radius: 14px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.12); }
        .policy-header { padding: 24px 28px; color: white; }
        .policy-header-basic   { background: linear-gradient(135deg, #495057, #6c757d); }
        .policy-header-premium { background: linear-gradient(135deg, #0a58ca, #0d6efd); }
        .policy-header-diamond { background: linear-gradient(135deg, #4e2d9e, #6f42c1); }
        .policy-body { background: white; padding: 24px 28px; }
        .policy-number { font-family: 'Courier New', monospace; font-size: 1.3rem; font-weight: 700;
                         letter-spacing: 2px; background: rgba(255,255,255,.2); display: inline-block;
                         padding: 4px 12px; border-radius: 6px; margin-top: 6px; }
        .policy-meta td { padding: 8px 0; font-size: .93rem; border-bottom: 1px solid #f0f0f0; }
        .policy-meta td:first-child { font-weight: 600; color: #666; width: 40%; }
        .coverage-pill { display: inline-flex; align-items: center; gap: 5px; background: #e9ecef; color: #333;
                         padding: 4px 12px; border-radius: 20px; font-size: .83rem; margin: 3px; }
        footer { background: #1b3a5c; color: rgba(255,255,255,.6); text-align: center; padding: 20px; font-size: .85rem; }
    </style>
</head>
<body>
<div class="topbar">
    <a th:href="@{/policy/lookup}"><i class="bi bi-arrow-left"></i> Back to Lookup</a>
    <span style="opacity:.4">|</span>
    <i class="bi bi-shield-check" style="font-size:1.3rem;"></i>
    <span style="font-weight:700; font-size:1.1rem;">FleetGuard</span>
</div>

<div class="container py-5" style="max-width:680px;">
    <h3 class="fw-bold mb-4" style="color:#1b3a5c;">
        <i class="bi bi-file-earmark-check-fill text-success me-2"></i>Your Policy
    </h3>

    <div class="policy-issued mb-4">
        <div class="policy-header"
             th:classappend="'policy-header-' + ${record.selectedTier.toLowerCase()}">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div style="font-size:.8rem; opacity:.8; text-transform:uppercase; letter-spacing:1px;">Policy Number</div>
                    <div class="policy-number" th:text="${record.policyNumber}"></div>
                </div>
                <div class="text-end">
                    <div style="font-size:.8rem; opacity:.8;">Plan</div>
                    <div style="font-size:1.2rem; font-weight:700;" th:text="${record.selectedTier}"></div>
                </div>
            </div>
        </div>
        <div class="policy-body">
            <table class="policy-meta w-100">
                <tr>
                    <td>Customer ID</td>
                    <td style="font-weight:700; color:#0d6efd;" th:text="${record.customerId}"></td>
                </tr>
                <tr>
                    <td>Company</td>
                    <td th:text="${record.companyName}"></td>
                </tr>
                <tr>
                    <td>Annual Premium</td>
                    <td style="font-size:1.2rem; font-weight:800; color:#0d6efd;">
                        $<span th:text="${record.annualPremium}"></span>
                    </td>
                </tr>
                <tr>
                    <td>Risk Category</td>
                    <td th:text="${record.riskCategory}"></td>
                </tr>
                <tr>
                    <td>Coverage</td>
                    <td>
                        <span th:each="c : ${record.coverages}" class="coverage-pill">
                            <i class="bi bi-check-circle-fill text-success"></i>
                            <span th:text="${c}"></span>
                        </span>
                    </td>
                </tr>
                <tr>
                    <td>Contact Phone</td>
                    <td>
                        <span th:text="${record.phoneNumber}"></span>
                        <small th:if="${record.phoneExtension != null and !record.phoneExtension.isEmpty()}"
                               class="text-muted" th:text="' ext. ' + ${record.phoneExtension}"></small>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <a th:href="@{/}" class="btn btn-outline-primary">
        <i class="bi bi-house me-1"></i> Back to Home
    </a>
</div>

<footer>&copy; 2026 FleetGuard Insurance</footer>
</body>
</html>
